name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      # Smoke-test that the API boots and serves the seeded project.
      - name: API smoke test
        run: |
          node server/index.js &
          SERVER_PID=$!
          sleep 2
          curl -fsS http://localhost:3001/api/projects > /dev/null
          kill $SERVER_PID
        env:
          API_PORT: 3001
